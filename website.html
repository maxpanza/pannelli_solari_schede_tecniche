<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Schede Tecniche Pannelli Solari</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sun-500: #E8A317;
            --sun-400: #F2BE4B;
            --sun-300: #F7D380;
            --ink-900: #1A1A2E;
            --ink-700: #2D2D44;
            --ink-500: #4A4A68;
            --ink-300: #8888A4;
            --ink-100: #E0E0EC;
            --bg: #F5F3EF;
            --card-bg: #FFFFFF;
            --radius: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--ink-900);
            min-height: 100vh;
        }

        /* --- HEADER --- */
        header {
            background: var(--ink-900);
            color: white;
            padding: 2.5rem 2rem 2rem;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -40px;
            width: 220px;
            height: 220px;
            background: var(--sun-500);
            border-radius: 50%;
            opacity: 0.12;
        }

        header::after {
            content: '';
            position: absolute;
            top: 20px;
            right: 20px;
            width: 120px;
            height: 120px;
            background: var(--sun-400);
            border-radius: 50%;
            opacity: 0.08;
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--sun-400);
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.4rem;
        }

        .header-sub {
            color: var(--ink-300);
            font-size: 0.95rem;
        }

        /* --- FILTERS --- */
        .filters-section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem 2rem 0;
        }

        .search-box {
            width: 100%;
            padding: 0.9rem 1.2rem 0.9rem 3rem;
            border: 2px solid var(--ink-100);
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--ink-900);
            transition: border-color 0.2s;
            outline: none;
        }

        .search-box:focus {
            border-color: var(--sun-500);
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-300);
            font-size: 1.1rem;
        }

        .filter-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .filter-select {
            padding: 0.55rem 0.9rem;
            border: 1.5px solid var(--ink-100);
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            background: var(--card-bg);
            color: var(--ink-700);
            cursor: pointer;
            outline: none;
            min-width: 150px;
        }

        .filter-select:focus {
            border-color: var(--sun-500);
        }

        .stats-bar {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: var(--ink-300);
            padding: 0.75rem 0;
            letter-spacing: 0.5px;
        }

        /* --- CARDS --- */
        .cards-section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem 3rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1.5px solid var(--ink-100);
            padding: 1.4rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            border-color: var(--sun-400);
            box-shadow: 0 4px 20px rgba(232, 163, 23, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.6rem;
        }

        .card-manufacturer {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--sun-500);
            font-weight: 700;
        }

        .card-year {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: var(--ink-300);
        }

        .card-model {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            color: var(--ink-900);
        }

        .card-description {
            font-size: 0.85rem;
            color: var(--ink-500);
            line-height: 1.5;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .card-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .spec {
            background: var(--bg);
            border-radius: 6px;
            padding: 0.5rem 0.7rem;
        }

        .spec-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--ink-300);
            margin-bottom: 0.15rem;
        }

        .spec-value {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--ink-900);
        }

        .card-download {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            background: var(--ink-900);
            color: white;
            border-radius: var(--radius);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: background 0.2s;
            align-self: flex-start;
        }

        .card-download:hover {
            background: var(--ink-700);
        }

        .card-download svg {
            width: 14px;
            height: 14px;
        }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--ink-300);
        }

        .empty-state-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .empty-state-text {
            font-size: 1rem;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 640px) {
            header { padding: 2rem 1.2rem 1.5rem; }
            h1 { font-size: 1.4rem; }
            .filters-section, .cards-section { padding-left: 1.2rem; padding-right: 1.2rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .filter-row { flex-direction: column; }
            .filter-select { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-inner">
        <div class="header-label">Archivio aperto</div>
        <h1>Schede Tecniche Pannelli Solari</h1>
        <p class="header-sub">Tutte le schede tecniche in un unico posto. Cerca, filtra, scarica.</p>
    </div>
</header>

<div class="filters-section">
    <div class="search-wrapper">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-box" id="searchInput" placeholder="Cerca per produttore, modello, descrizione...">
    </div>
    <div class="filter-row">
        <select class="filter-select" id="filterProduttore">
            <option value="">Tutti i produttori</option>
        </select>
        <select class="filter-select" id="filterAnno">
            <option value="">Tutti gli anni</option>
        </select>
        <select class="filter-select" id="filterPotenzaMin">
            <option value="">Potenza min (W)</option>
            <option value="100">≥ 100W</option>
            <option value="200">≥ 200W</option>
            <option value="300">≥ 300W</option>
            <option value="400">≥ 400W</option>
            <option value="500">≥ 500W</option>
        </select>
        <select class="filter-select" id="filterEfficienzaMin">
            <option value="">Efficienza min (%)</option>
            <option value="18">≥ 18%</option>
            <option value="20">≥ 20%</option>
            <option value="22">≥ 22%</option>
        </select>
    </div>
    <div class="stats-bar" id="statsBar"></div>
</div>

<div class="cards-section">
    <div class="cards-grid" id="cardsGrid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-state-icon">☀</div>
        <div class="empty-state-text">Nessun pannello trovato con questi filtri.</div>
    </div>
</div>

<script>
let panels = [];

// --- DOM refs ---
const searchInput = document.getElementById('searchInput');
const filterProduttore = document.getElementById('filterProduttore');
const filterAnno = document.getElementById('filterAnno');
const filterPotenzaMin = document.getElementById('filterPotenzaMin');
const filterEfficienzaMin = document.getElementById('filterEfficienzaMin');
const cardsGrid = document.getElementById('cardsGrid');
const emptyState = document.getElementById('emptyState');
const statsBar = document.getElementById('statsBar');

// --- Load data from JSON file ---
fetch('pannelli_solari.json')
    .then(r => r.json())
    .then(data => {
        panels = data;
        populateFilters();
        applyFilters();
    })
    .catch(err => {
        statsBar.textContent = 'Errore nel caricamento dei dati.';
        console.error(err);
    });

// --- Populate filter dropdowns ---
function populateFilters() {
    const produttori = [...new Set(panels.map(p => p.produttore))].sort();
    produttori.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        filterProduttore.appendChild(opt);
    });

    const anni = [...new Set(panels.map(p => p.anno).filter(a => a !== null))].sort((a, b) => b - a);
    anni.forEach(year => {
        const opt = document.createElement('option');
        opt.value = year;
        opt.textContent = year;
        filterAnno.appendChild(opt);
    });
}

// --- Render cards ---
function renderCards(filtered) {
    cardsGrid.innerHTML = '';

    if (filtered.length === 0) {
        emptyState.style.display = 'block';
        statsBar.textContent = '0 pannelli trovati';
        return;
    }

    emptyState.style.display = 'none';
    statsBar.textContent = filtered.length + ' pannell' + (filtered.length === 1 ? 'o trovato' : 'i trovati') + ' su ' + panels.length;

    filtered.forEach(panel => {
        const annoDisplay = panel.anno ? panel.anno : '—';
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">
                <span class="card-manufacturer">${panel.produttore}</span>
                <span class="card-year">${annoDisplay}</span>
            </div>
            <div class="card-model">${panel.modello}</div>
            <div class="card-description">${panel.descrizione}</div>
            <div class="card-specs">
                <div class="spec">
                    <div class="spec-label">Potenza</div>
                    <div class="spec-value">${panel.potenza_watt}W</div>
                </div>
                <div class="spec">
                    <div class="spec-label">Efficienza</div>
                    <div class="spec-value">${panel.efficienza}%</div>
                </div>
            </div>
            <a href="${panel.pdf}" class="card-download" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v12m0 0l-4-4m4 4l4-4M4 18h16"/></svg>
                Scarica PDF
            </a>
        `;
        cardsGrid.appendChild(card);
    });
}

// --- Filter logic ---
function applyFilters() {
    const query = searchInput.value.toLowerCase().trim();
    const produttore = filterProduttore.value;
    const anno = filterAnno.value;
    const potenzaMin = filterPotenzaMin.value;
    const efficienzaMin = filterEfficienzaMin.value;

    const filtered = panels.filter(p => {
        if (query) {
            const haystack = [p.produttore, p.modello, p.descrizione, String(p.potenza_watt), String(p.efficienza), String(p.anno || '')].join(' ').toLowerCase();
            if (!haystack.includes(query)) return false;
        }
        if (produttore && p.produttore !== produttore) return false;
        if (anno && p.anno !== Number(anno)) return false;
        if (potenzaMin && p.potenza_watt < Number(potenzaMin)) return false;
        if (efficienzaMin && p.efficienza < Number(efficienzaMin)) return false;
        return true;
    });

    renderCards(filtered);
}

// --- Event listeners ---
searchInput.addEventListener('input', applyFilters);
filterProduttore.addEventListener('change', applyFilters);
filterAnno.addEventListener('change', applyFilters);
filterPotenzaMin.addEventListener('change', applyFilters);
filterEfficienzaMin.addEventListener('change', applyFilters);
</script>

</body>
</html>
